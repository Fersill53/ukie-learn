<mat-sidenav-container class="app-shell">
  <mat-sidenav
    #sidenav
    class="app-sidenav"
    mode="over"
    [fixedInViewport]="true"
    [fixedTopGap]="56"
  >
    <div class="sidenav-header">
      <div class="brand">Ukrainian Trainer</div>
      <button mat-icon-button aria-label="Close navigation" (click)="sidenav.close()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" (click)="sidenav.close()">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>

      <a mat-list-item routerLink="/review" (click)="sidenav.close()">
        <mat-icon matListItemIcon>repeat</mat-icon>
        <span matListItemTitle>Review</span>
      </a>

      <a mat-list-item routerLink="/learn" (click)="sidenav.close()">
        <mat-icon matListItemIcon>school</mat-icon>
        <span matListItemTitle>Learn</span>
      </a>

      <a mat-list-item routerLink="/dialogues" (click)="sidenav.close()">
        <mat-icon matListItemIcon>record_voice_over</mat-icon>
        <span matListItemTitle>Dialogues</span>
      </a>

      <a mat-list-item routerLink="/decks" (click)="sidenav.close()">
        <mat-icon matListItemIcon>style</mat-icon>
        <span matListItemTitle>Decks</span>
      </a>

      <a mat-list-item routerLink="/stats" (click)="sidenav.close()">
        <mat-icon matListItemIcon>insights</mat-icon>
        <span matListItemTitle>Stats</span>
      </a>

      <a mat-list-item routerLink="/settings" (click)="sidenav.close()">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer">
      <div class="hint">Daily loop: Review → Learn → Listen</div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="app-toolbar" color="primary">
      <button
        mat-icon-button
        aria-label="Open navigation"
        (click)="sidenav.open()"
      >
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-title">Ukrainian Trainer</span>

      <span class="spacer"></span>

      <!-- Optional quick action -->
      <a mat-button routerLink="/review">
        <mat-icon class="mr-6">play_arrow</mat-icon>
        Review
      </a>
    </mat-toolbar>

    <main class="app-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
